services:
  - type: web
    runtime: docker
    name: capuzzella
    repo: https://github.com/mauricewipf/capuzzella
    numInstances: 1
    region: frankfurt
    plan: starter
    branch: main
    dockerfilePath: ./container/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: anthropic
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: OPENAI_MODEL
        value: gpt-4.1
      - key: SITE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: TRUSTED_PROXY
        value: "true"
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
