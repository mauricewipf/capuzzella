<section class="mb-5">
  <h2>Button</h2>

  <h3 class="h6 text-muted mt-4">Variants</h3>
  <div class="d-flex flex-wrap gap-2 mb-3">
    <button type="button" class="btn btn-primary">Primary</button>
    <button type="button" class="btn btn-secondary">Secondary</button>
    <button type="button" class="btn btn-success">Success</button>
    <button type="button" class="btn btn-info">Info</button>
    <button type="button" class="btn btn-warning">Warning</button>
    <button type="button" class="btn btn-danger">Danger</button>
    <button type="button" class="btn btn-link">Link</button>
  </div>

  <h3 class="h6 text-muted mt-4">Outline</h3>
  <div class="d-flex flex-wrap gap-2 mb-3">
    <button type="button" class="btn btn-outline-primary">Outline Primary</button>
    <button type="button" class="btn btn-outline-secondary">Outline Secondary</button>
  </div>

  <h3 class="h6 text-muted mt-4">With icon</h3>
  <div class="d-flex flex-wrap gap-2 mb-3">
    <button type="button" class="btn btn-primary">★ With Icon</button>
    <button type="button" class="btn btn-outline-secondary" aria-label="Icon only">⚙</button>
  </div>

  <h3 class="h6 text-muted mt-4">Button group</h3>
  <div class="btn-group">
    <button type="button" class="btn btn-secondary">Left</button>
    <button type="button" class="btn btn-secondary">Middle</button>
    <button type="button" class="btn btn-secondary">Right</button>
  </div>
</section>
